# Pages placed under these sections will be shown on homepage and archive page.
mainSections = ["post"]
# Output page's full content in RSS.
rssFullContent = true
favicon        = "img/favicon.png"

# Accepted values: "default", "lastmod"
# default = see https://gohugo.io/quick-reference/glossary/#default-sort-order
# lastmod = sort by last modified date, in descending order
SortBy              = "default"

[footer]
    since      = 2026
    customText = ""

[dateFormat]
    published   = ":date_full"
    lastUpdated = ":date_full"

[sidebar]
    subtitle = "Hey! I'm an ai hentai creator, making anime-style NSFW illustrations with AI. Like my work? Support me on Patreon or Unifans for exclusive uncensored content. Thanks!"
    avatar   = "img/avatar.png"

[article]
    headingAnchor = false
    math          = false
    readingTime   = true

    [article.license]
        enabled = true
        default = "Licensed under CC BY-NC-SA 4.0"

[widgets]
    homepage = [
        { type = "search" },
        { type = "archives", params = { limit = 5 } },
        { type = "categories", params = { limit = 10 } },
        { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

[opengraph.twitter]
    site = ""
    card = "summary_large_image"

[colorScheme]
    toggle  = true
    default = "auto"

## Comments
[comments]
    enabled  = false
    provider = "waline"

    [comments.waline]
        serverURL    = "https://your-waline-server.vercel.app"
        lang         = "auto"
        pageview     = true
        emoji        = ["https://unpkg.com/@waline/emojis@1.0.1/weibo"]
        requiredMeta = ["name", "email"]

        [comments.waline.locale]
            admin       = "Admin"
            placeholder = "留下评论"
